<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stand Mitigation Rules Engine</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f5f5;
      --surface: #ffffff;
      --border: #e0e0e0;
      --text: #1a1a1a;
      --muted: #6b6b6b;
      --primary: #1a56db;
      --primary-hover: #1345b7;
      --green: #057a55;
      --green-bg: #f0fdf4;
      --yellow: #92400e;
      --yellow-bg: #fffbeb;
      --red: #9b1c1c;
      --red-bg: #fef2f2;
      --blue-bg: #eff6ff;
      --badge-draft: #6b7280;
      --badge-review: #1a56db;
      --badge-active: #057a55;
      --badge-deactivated: #9b1c1c;
    }

    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.5; }

    header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; display: flex; align-items: center; gap: 32px; }
    header h1 { font-size: 16px; font-weight: 600; padding: 16px 0; white-space: nowrap; }
    nav { display: flex; gap: 0; }
    nav button { background: none; border: none; border-bottom: 3px solid transparent; padding: 16px 20px; cursor: pointer; font-size: 14px; color: var(--muted); font-weight: 500; transition: color 0.15s; }
    nav button:hover { color: var(--text); }
    nav button.active { color: var(--primary); border-bottom-color: var(--primary); }

    main { max-width: 960px; margin: 0 auto; padding: 24px; }

    .tab { display: none; }
    .tab.active { display: block; }

    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 20px; margin-bottom: 16px; }
    .card h2 { font-size: 15px; font-weight: 600; margin-bottom: 16px; }
    .card h3 { font-size: 13px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 12px; }

    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .form-group { display: flex; flex-direction: column; gap: 4px; }
    .form-group.full { grid-column: 1 / -1; }
    label { font-size: 12px; font-weight: 500; color: var(--muted); }
    select, input[type="number"], input[type="text"], input[type="datetime-local"], textarea {
      border: 1px solid var(--border); border-radius: 6px; padding: 8px 10px;
      font-size: 14px; font-family: inherit; color: var(--text); background: var(--surface);
      width: 100%; transition: border-color 0.15s;
    }
    select:focus, input:focus, textarea:focus { outline: none; border-color: var(--primary); }
    textarea { resize: vertical; min-height: 120px; font-family: "SF Mono", "Monaco", monospace; font-size: 12px; }

    .veg-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 8px; }
    .veg-item { display: flex; gap: 8px; align-items: center; }
    .veg-item select { flex: 1; }
    .veg-item input { flex: 1; }
    .veg-item button { background: none; border: 1px solid var(--border); border-radius: 6px; padding: 6px 10px; cursor: pointer; color: var(--muted); font-size: 12px; white-space: nowrap; }
    .veg-item button:hover { color: var(--red); border-color: var(--red); }

    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer; font-size: 13px; font-weight: 500; font-family: inherit; transition: background 0.15s; }
    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover { background: var(--primary-hover); }
    .btn-primary:disabled { background: #a0aec0; cursor: not-allowed; }
    .btn-sm { padding: 5px 10px; font-size: 12px; }
    .btn-outline { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
    .btn-outline:hover { background: var(--bg); }
    .btn-danger { background: var(--surface); color: var(--red); border: 1px solid var(--border); }
    .btn-danger:hover { background: var(--red-bg); border-color: var(--red); }
    .btn-green { background: var(--surface); color: var(--green); border: 1px solid var(--border); }
    .btn-green:hover { background: var(--green-bg); border-color: var(--green); }
    .btn-add { background: none; border: 1px dashed var(--border); border-radius: 6px; padding: 8px; cursor: pointer; font-size: 12px; color: var(--muted); width: 100%; text-align: center; }
    .btn-add:hover { border-color: var(--primary); color: var(--primary); }

    .results { margin-top: 20px; }
    .summary-bar { display: flex; gap: 16px; padding: 12px 16px; background: var(--blue-bg); border: 1px solid #bfdbfe; border-radius: 8px; margin-bottom: 16px; font-size: 13px; }
    .summary-bar span { color: var(--muted); }
    .summary-bar strong { color: var(--text); }
    .summary-pass { background: var(--green-bg); border-color: #bbf7d0; padding: 20px; border-radius: 8px; text-align: center; color: var(--green); font-weight: 600; font-size: 15px; }

    .vuln-card { border: 1px solid var(--border); border-radius: 8px; overflow: hidden; margin-bottom: 12px; }
    .vuln-header { padding: 12px 16px; background: var(--bg); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: flex-start; }
    .vuln-title { font-weight: 600; font-size: 14px; }
    .vuln-category { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-top: 2px; }
    .vuln-body { padding: 14px 16px; display: flex; flex-direction: column; gap: 12px; }
    .written-rule { font-size: 13px; color: var(--muted); font-style: italic; }
    .mit-section h4 { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
    .mit-section.full h4 { color: var(--green); }
    .mit-section.bridge h4 { color: var(--yellow); }
    .mit-section.none h4 { color: var(--red); }
    .mit-list { list-style: none; display: flex; flex-direction: column; gap: 4px; }
    .mit-list li { font-size: 13px; padding: 6px 10px; border-radius: 5px; }
    .mit-section.full .mit-list li { background: var(--green-bg); color: var(--green); }
    .mit-section.bridge .mit-list li { background: var(--yellow-bg); color: var(--yellow); }
    .mit-section.none .mit-list li { background: var(--red-bg); color: var(--red); }
    .mit-desc { font-size: 11px; opacity: 0.75; margin-top: 2px; }

    /* Mitigation Simulator */
    .simulator { border-top: 1px solid var(--border); margin-top: 4px; padding-top: 12px; }
    .simulator h4 { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--primary); margin-bottom: 10px; }
    .sim-table { width: 100%; border-collapse: collapse; margin-bottom: 12px; font-size: 12px; }
    .sim-table th { text-align: left; padding: 5px 8px; color: var(--muted); font-weight: 600; border-bottom: 1px solid var(--border); }
    .sim-table td { padding: 6px 8px; border-bottom: 1px solid var(--border); }
    .sim-table tr:last-child td { border-bottom: none; }
    .sim-pass td { background: var(--green-bg); }
    .sim-fail td { background: var(--red-bg); }
    .sim-status { font-weight: 700; }
    .sim-status.pass { color: var(--green); }
    .sim-status.fail { color: var(--red); }
    .mit-checkbox-list { display: flex; flex-direction: column; gap: 6px; }
    /* Default (unresolved) — red for full, yellow for bridge */
    .mit-checkbox-item { display: flex; align-items: flex-start; gap: 8px; padding: 8px 10px; background: var(--yellow-bg); border-radius: 5px; cursor: pointer; transition: background 0.15s; }
    .mit-checkbox-item input[type="checkbox"] { margin-top: 2px; cursor: pointer; accent-color: var(--yellow); width: 14px; height: 14px; flex-shrink: 0; }
    .mit-checkbox-item label { cursor: pointer; font-size: 13px; color: var(--yellow); }
    .mit-checkbox-item label strong { display: block; }
    .mit-checkbox-item label span, .mit-checkbox-item label .mit-desc { font-size: 11px; opacity: 0.8; }
    .mit-checkbox-item.full-mit { background: var(--red-bg); }
    .mit-checkbox-item.full-mit label { color: var(--red); }
    .mit-checkbox-item.full-mit input[type="checkbox"] { accent-color: var(--red); }
    /* Applied (checked) — green for both types */
    .mit-checkbox-item.applied { background: var(--green-bg); }
    .mit-checkbox-item.applied label { color: var(--green); }
    .mit-checkbox-item.applied input[type="checkbox"] { accent-color: var(--green); }
    .sim-resolved { padding: 8px 12px; border-radius: 5px; font-size: 13px; font-weight: 600; margin-top: 10px; text-align: center; }
    .sim-resolved.pass { background: var(--green-bg); color: var(--green); }
    .sim-resolved.fail { background: var(--red-bg); color: var(--red); }
    .house-visual { margin-bottom: 16px; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }

    /* Applied Science */
    .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .toolbar h2 { font-size: 15px; font-weight: 600; }

    table { width: 100%; border-collapse: collapse; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
    thead tr { background: var(--bg); }
    th { text-align: left; padding: 10px 14px; font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; border-bottom: 1px solid var(--border); }
    td { padding: 10px 14px; font-size: 13px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--bg); }

    .badge { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 600; }
    .badge-draft       { background: #f3f4f6; color: var(--badge-draft); }
    .badge-under_review { background: #eff6ff; color: var(--badge-review); }
    .badge-activated   { background: var(--green-bg); color: var(--badge-active); }
    .badge-deactivated { background: var(--red-bg); color: var(--badge-deactivated); }

    .actions { display: flex; gap: 6px; flex-wrap: wrap; }

    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--surface); border-radius: 10px; padding: 24px; width: 600px; max-width: 95vw; max-height: 90vh; overflow-y: auto; }
    .modal h2 { font-size: 16px; font-weight: 600; margin-bottom: 16px; }
    .modal-footer { display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px; }

    .detail-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 20px; margin-top: 16px; }
    .detail-panel h3 { font-size: 14px; font-weight: 600; margin-bottom: 12px; }
    .detail-section { margin-bottom: 16px; }
    .detail-section label { font-size: 11px; color: var(--muted); font-weight: 600; text-transform: uppercase; display: block; margin-bottom: 4px; }
    .code-block { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 12px; font-family: monospace; font-size: 12px; white-space: pre-wrap; overflow-x: auto; }

    .audit-log { list-style: none; display: flex; flex-direction: column; gap: 6px; }
    .audit-entry { display: flex; gap: 12px; font-size: 12px; padding: 8px 10px; background: var(--bg); border-radius: 6px; }
    .audit-entry .ts { color: var(--muted); white-space: nowrap; }
    .audit-arrow { color: var(--muted); }

    .test-result { margin-top: 12px; padding: 12px; border-radius: 6px; font-size: 13px; font-weight: 500; }
    .test-pass { background: var(--green-bg); color: var(--green); }
    .test-fail { background: var(--red-bg); color: var(--red); }

    .empty { text-align: center; color: var(--muted); padding: 32px; font-size: 13px; }
    .loading { text-align: center; color: var(--muted); padding: 16px; font-size: 13px; }
    .error-msg { background: var(--red-bg); color: var(--red); border: 1px solid #fca5a5; border-radius: 6px; padding: 10px 14px; font-size: 13px; margin-bottom: 12px; }
  </style>
</head>
<body>

<header>
  <h1>Stand Mitigation Rules Engine</h1>
  <nav>
    <button class="active" onclick="switchTab('underwriter', this)">Underwriter</button>
    <button onclick="switchTab('applied-science', this)">Applied Science</button>
  </nav>
</header>

<main>

  <!-- ─── UNDERWRITER TAB ─── -->
  <div id="tab-underwriter" class="tab active">
    <div class="card">
      <h2>Property Observations</h2>
      <div class="form-grid">
        <div class="form-group">
          <label>Attic Vent Screens</label>
          <select id="attic_vent_screens" onchange="checkObservations()">
            <option value="">— not observed —</option>
            <option>None</option>
            <option>Standard</option>
            <option>Ember Resistant</option>
          </select>
        </div>
        <div class="form-group">
          <label>Roof Type</label>
          <select id="roof_type" onchange="checkObservations()">
            <option value="">— not observed —</option>
            <option>Class A</option>
            <option>Class B</option>
            <option>Class C</option>
          </select>
        </div>
        <div class="form-group">
          <label>Window Type</label>
          <select id="window_type" onchange="checkObservations()">
            <option value="">— not observed —</option>
            <option>Single</option>
            <option>Double</option>
            <option>Tempered Glass</option>
          </select>
        </div>
        <div class="form-group">
          <label>Wildfire Risk Category</label>
          <select id="wildfire_risk_category" onchange="checkObservations()">
            <option value="">— not observed —</option>
            <option>A</option>
            <option>B</option>
            <option>C</option>
            <option>D</option>
          </select>
        </div>
        <div class="form-group">
          <label>Home-to-Home Distance (ft)</label>
          <input type="number" id="home_to_home_distance" placeholder="e.g. 20" min="0" step="0.1" oninput="checkObservations()" />
        </div>
        <div class="form-group">
          <label>Evaluation Period (optional)</label>
          <div style="display:flex; flex-direction:column; gap:6px">
            <div>
              <div style="font-size:11px; color:var(--muted); margin-bottom:3px">From</div>
              <input type="datetime-local" id="from_date" />
            </div>
            <div>
              <div style="font-size:11px; color:var(--muted); margin-bottom:3px">To</div>
              <input type="datetime-local" id="to_date" />
            </div>
          </div>
        </div>
        <div class="form-group full">
          <label>Vegetation</label>
          <div class="veg-list" id="veg-list"></div>
          <button class="btn-add" onclick="addVegetation()">+ Add Vegetation Item</button>
        </div>
      </div>
      <div style="margin-top:16px; display:flex; gap:8px; align-items:center;">
        <button id="btn-evaluate" class="btn btn-primary" onclick="runEvaluation()" disabled>Evaluate Property</button>
        <button class="btn btn-outline btn-sm" onclick="loadExample()">Load Example</button>
        <button class="btn btn-outline btn-sm" onclick="clearForm()">Clear</button>
      </div>
    </div>

    <div class="results" id="results"></div>
  </div>

  <!-- ─── APPLIED SCIENCE TAB ─── -->
  <div id="tab-applied-science" class="tab">
    <div class="toolbar">
      <h2>Rules Database</h2>
      <button class="btn btn-primary btn-sm" onclick="openCreateModal()">+ New Rule</button>
    </div>
    <div id="rules-table-container"><div class="loading">Loading rules…</div></div>
    <div id="rule-detail"></div>
  </div>

</main>

<!-- ─── CREATE / EDIT RULE MODAL ─── -->
<div class="modal-overlay" id="rule-modal">
  <div class="modal">
    <h2 id="modal-title">New Rule</h2>
    <input type="hidden" id="modal-rule-id" />
    <div class="form-grid">
      <div class="form-group">
        <label>Slug (unique identifier, snake_case)</label>
        <input type="text" id="m-slug" placeholder="e.g. roof_class" />
      </div>
      <div class="form-group">
        <label>Category</label>
        <input type="text" id="m-category" placeholder="e.g. roof" />
      </div>
      <div class="form-group full">
        <label>Name</label>
        <input type="text" id="m-name" placeholder="e.g. Roof — Class Rating" />
      </div>
      <div class="form-group full">
        <label>Written Rule (human-readable for policy holders)</label>
        <textarea id="m-written-rule" rows="3"></textarea>
      </div>
      <div class="form-group">
        <label>Evaluator Type</label>
        <select id="m-type">
          <option value="boolean_condition">boolean_condition</option>
          <option value="threshold_condition">threshold_condition</option>
        </select>
      </div>
      <div class="form-group">
        <label>Author Name</label>
        <input type="text" id="m-author-name" placeholder="Your name" />
      </div>
      <div class="form-group full">
        <label>Definition (JSON)</label>
        <textarea id="m-definition" rows="10" placeholder='{"condition": {...}}'></textarea>
      </div>
      <div class="form-group full">
        <label>Change Note</label>
        <input type="text" id="m-change-note" placeholder="Why is this rule being created/updated?" />
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline btn-sm" onclick="loadRandomRule()" style="margin-right:auto">Load Random Rule</button>
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveRule()">Save Draft</button>
    </div>
  </div>
</div>

<!-- ─── TRANSITION MODAL ─── -->
<div class="modal-overlay" id="transition-modal">
  <div class="modal" style="width:400px">
    <h2 id="transition-modal-title">Transition Rule</h2>
    <input type="hidden" id="transition-rule-id" />
    <input type="hidden" id="transition-to-status" />
    <div class="form-grid" style="grid-template-columns:1fr">
      <div class="form-group">
        <label>Your Name</label>
        <input type="text" id="transition-author" placeholder="e.g. Jane Smith" />
      </div>
      <div class="form-group">
        <label>Change Note (optional)</label>
        <input type="text" id="transition-note" placeholder="Reason for this transition" />
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeTransitionModal()">Cancel</button>
      <button class="btn btn-primary" onclick="confirmTransition()">Confirm</button>
    </div>
  </div>
</div>

<!-- ─── TEST RULE MODAL ─── -->
<div class="modal-overlay" id="test-modal">
  <div class="modal">
    <h2>Test Rule</h2>
    <p style="font-size:13px; color:var(--muted); margin-bottom:12px;" id="test-modal-subtitle"></p>
    <div class="form-group">
      <label>Observations (JSON)</label>
      <textarea id="test-observations" rows="12" placeholder='{"roof_type": "Class B", "wildfire_risk_category": "B"}'></textarea>
    </div>
    <div id="test-result"></div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeTestModal()">Close</button>
      <button class="btn btn-primary" onclick="runTest()">Run Test</button>
    </div>
  </div>
</div>

<script>
// ─── TIMEZONE HELPERS (local timezone) ───────────────────────────────────────
function msToLocal(ms) {
  // Accept epoch-ms integers (new format) or legacy datetime strings (old DB).
  const d = typeof ms === 'number' ? new Date(ms) : new Date(String(ms).replace(' ', 'T'));
  if (isNaN(d.getTime())) return String(ms);
  // Safari throws "The string did not match the expected pattern" on toLocaleString
  // when hour12:false is combined with hour:'2-digit' — wrap and fall back to UTC ISO.
  try {
    const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
    const tzAbbr = d.toLocaleTimeString('en-US', { timeZoneName: 'short' }).split(' ').pop();
    return d.toLocaleString('en-US', {
      timeZone: tz,
      year: 'numeric', month: '2-digit', day: '2-digit',
      hour: '2-digit', minute: '2-digit', second: '2-digit',
      hour12: false,
    }).replace(',', '') + ' ' + tzAbbr;
  } catch (_) {
    return d.toISOString().replace('T', ' ').slice(0, 19) + ' UTC';
  }
}

// Convert a datetime-local string (treated as local time) to epoch milliseconds.
// datetime-local values can be "YYYY-MM-DDTHH:MM", "YYYY-MM-DDTHH:MM:SS", or
// "YYYY-MM-DDTHH:MM:SS.SSS" — normalize to the first 16 chars before appending
// ":00Z" so the constructed UTC string is always valid ISO 8601.
function localInputToMs(dtStr) {
  if (!dtStr) return null;
  const base = dtStr.slice(0, 16); // "YYYY-MM-DDTHH:MM" — strips seconds if present
  const approxUtc = new Date(base + ':00Z');
  const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
  const localStr = approxUtc.toLocaleString('sv-SE', { timeZone: tz });
  const localAsUtc = new Date(localStr.replace(' ', 'T') + 'Z');
  const offset = approxUtc.getTime() - localAsUtc.getTime();
  return new Date(base + ':00Z').getTime() + offset;
}

// ─── STATE ───────────────────────────────────────────────────────────────────
let vegetationItems = [];
let allRules = [];
let testingRuleId = null;
let baseObservations = {};
let appliedMitigations = new Set();
let appliedFullMitigations = new Set();
let lastEvaluationData = null;
let lastAsOf = null;

// ─── TABS ────────────────────────────────────────────────────────────────────
function switchTab(name, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  btn.classList.add('active');
  if (name === 'applied-science') loadRules();
}

// ─── VEGETATION ──────────────────────────────────────────────────────────────
function addVegetation(type = 'Tree', distance = '') {
  vegetationItems.push({ type, distance });
  renderVegetation();
}

function removeVegetation(i) {
  vegetationItems.splice(i, 1);
  renderVegetation();
}

function renderVegetation() {
  const list = document.getElementById('veg-list');
  list.innerHTML = vegetationItems.map((item, i) => `
    <div class="veg-item">
      <select onchange="vegetationItems[${i}].type = this.value">
        ${['Tree','Shrub','Grass'].map(t => `<option ${item.type===t?'selected':''}>${t}</option>`).join('')}
      </select>
      <input type="number" value="${item.distance}" placeholder="distance to window (ft)" min="0" step="0.1"
        onchange="vegetationItems[${i}].distance = parseFloat(this.value) || 0" />
      <button onclick="removeVegetation(${i})">Remove</button>
    </div>
  `).join('');
  checkObservations();
}

function checkObservations() {
  const fields = ['attic_vent_screens','roof_type','window_type','wildfire_risk_category'];
  const anyField = fields.some(id => document.getElementById(id).value !== '');
  const hasDist  = document.getElementById('home_to_home_distance').value.trim() !== '';
  const hasVeg   = vegetationItems.length > 0;
  document.getElementById('btn-evaluate').disabled = !(anyField || hasDist || hasVeg);
}

// ─── EVALUATION ──────────────────────────────────────────────────────────────
async function runEvaluation() {
  baseObservations = buildObservations();
  appliedMitigations = new Set();
  appliedFullMitigations = new Set();
  lastEvaluationData = null;
  await evaluateWithMitigations();
}

async function evaluateWithMitigations() {
  const obs = { ...baseObservations };
  if (appliedMitigations.size > 0) obs.applied_mitigations = [...appliedMitigations];

  const fromVal = document.getElementById('from_date').value;
  const toVal   = document.getElementById('to_date').value;

  const body = { observations: obs };
  if (fromVal) body.from_date = localInputToMs(fromVal);
  if (toVal)   body.to_date   = localInputToMs(toVal);

  try {
    const res = await fetch('/evaluate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    const data = await res.json();
    renderResults(data);
  } catch (e) {
    document.getElementById('results').innerHTML = `<div class="error-msg">Request failed: ${e.message}</div>`;
  }
}

async function toggleMitigation(slug) {
  if (appliedMitigations.has(slug)) {
    appliedMitigations.delete(slug);
  } else {
    appliedMitigations.add(slug);
  }
  await evaluateWithMitigations();
}

function buildObservations() {
  const obs = {};
  const fields = ['attic_vent_screens','roof_type','window_type','wildfire_risk_category'];
  fields.forEach(f => {
    const v = document.getElementById(f).value;
    if (v) obs[f] = v;
  });
  const dist = document.getElementById('home_to_home_distance').value;
  if (dist) obs.home_to_home_distance = parseFloat(dist);
  if (vegetationItems.length) {
    obs.vegetation = vegetationItems.map(v => ({
      type: v.type,
      distance_to_window: parseFloat(v.distance) || 0,
    }));
  }
  return obs;
}

// ─── HOUSE VISUAL ────────────────────────────────────────────────────────────
function buildHouseVisual(obs, violations, bridgeMits, fullMits) {
  const W = 680, H = 370;
  const ground = 295;
  const hW = 175, hH = 120, hX = 265;
  const hTop = ground - hH, hMid = hX + hW / 2, roofPeak = hTop - 65, roofOH = 14;

  const roofType  = obs.roof_type || '';
  const ventType  = obs.attic_vent_screens || '';
  const winType   = obs.window_type || '';
  const hhDist    = typeof obs.home_to_home_distance === 'number' ? obs.home_to_home_distance : null;
  const veg       = obs.vegetation || [];
  const wfRisk    = obs.wildfire_risk_category || '';

  const roofVuln = violations.has('roof_class');
  const ventVuln = violations.has('attic_vent_screens');
  const hhVuln   = violations.has('home_to_home_distance');
  const vegVuln  = violations.has('windows_vegetation_distance');

  const roofReplaced  = fullMits.has('Replace Roof with Class A Assembly');
  const ventsFixed    = fullMits.has('Install Ember-Resistant Vents');
  const vegRemoved    = fullMits.has('Remove Vegetation');
  const winsReplaced  = fullMits.has('Replace Windows with Tempered Glass');
  const filmApplied   = bridgeMits.has('apply_window_film');
  const retardant     = bridgeMits.has('apply_flame_retardant_shrubs');
  const pruneTrees    = bridgeMits.has('prune_trees');

  const roofOK  = roofReplaced || !roofVuln;
  const ventsOK = ventsFixed   || !ventVuln;
  const hhOK    = !hhVuln;

  const roofFill   = roofOK  ? '#3d4a5c' : '#c0392b';
  const roofEdge   = roofOK  ? '#2c3e50' : '#a93226';
  const ventFill   = ventsOK ? '#27ae60' : '#e74c3c';
  const winFill    = winsReplaced ? '#aad4f5' : filmApplied ? '#c3e6f7' : '#dff0ff';
  const winEdge    = winsReplaced ? '#2471a3' : '#3498db';
  const effectiveWinType = winsReplaced ? 'Tempered Glass' : winType;

  let s = `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg"
    style="width:100%;display:block">
  <defs>
    <linearGradient id="hSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7ec8e3"/>
      <stop offset="100%" stop-color="#d6eeff"/>
    </linearGradient>
    <linearGradient id="hGnd" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5cb85c"/>
      <stop offset="100%" stop-color="#3a7a3a"/>
    </linearGradient>
  </defs>
  <rect width="${W}" height="${ground}" fill="url(#hSky)"/>
  <rect y="${ground}" width="${W}" height="${H-ground}" fill="url(#hGnd)"/>`;

  // ── Wildfire risk badge ──
  if (wfRisk) {
    const rc = {A:'#27ae60',B:'#e67e22',C:'#d35400',D:'#c0392b'}[wfRisk] || '#7f8c8d';
    s += `<rect x="10" y="10" width="78" height="22" rx="4" fill="${rc}" opacity="0.9"/>
    <text x="49" y="25" text-anchor="middle" font-size="11" fill="white" font-weight="700">Risk Cat ${wfRisk}</text>`;
  }

  // ── Neighbor house ──
  if (hhDist !== null) {
    const gap = Math.min(140, Math.max(28, hhDist * 2.2));
    const nW = 85, nH = 85, nX = hX - gap - nW;
    const nMid = nX + nW/2, nTop2 = ground - nH, nPeak2 = nTop2 - 44;
    const nc = hhOK ? '#7f8c8d' : '#c0392b', nr = hhOK ? '#5d6d7e' : '#922b21';
    if (nX > 5) {
      s += `<polygon points="${nMid},${nPeak2} ${nX-8},${nTop2} ${nX+nW+8},${nTop2}" fill="${nr}" opacity="0.8"/>
      <rect x="${nX}" y="${nTop2}" width="${nW}" height="${nH}" fill="${nc}" opacity="0.8"/>
      <rect x="${nMid-11}" y="${ground-32}" width="22" height="32" fill="#5d4037" opacity="0.8"/>`;
      const ly = ground - 10, lc = hhOK ? '#27ae60' : '#e74c3c';
      s += `<line x1="${nX+nW}" y1="${ly}" x2="${hX}" y2="${ly}" stroke="${lc}" stroke-width="1.5" stroke-dasharray="5,3"/>
      <text x="${(nX+nW+hX)/2}" y="${ly-4}" text-anchor="middle" font-size="11" fill="${lc}" font-weight="600">${hhDist} ft</text>`;
    }
  }

  // ── House walls ──
  s += `<rect x="${hX}" y="${hTop}" width="${hW}" height="${hH}" fill="#f5efe6" stroke="#c9ae8a" stroke-width="1.5"/>`;

  // ── Roof ──
  s += `<polygon points="${hMid},${roofPeak} ${hX-roofOH},${hTop+6} ${hX+hW+roofOH},${hTop+6}" fill="${roofFill}" stroke="${roofEdge}" stroke-width="2"/>`;
  if (roofType || roofReplaced) {
    const lbl = roofReplaced && roofVuln ? 'Class A ✓' : roofType;
    s += `<text x="${hMid}" y="${Math.round((roofPeak+hTop+6)/2)+5}" text-anchor="middle" font-size="11" fill="${roofOK?'#ecf0f1':'#fadbd8'}" font-weight="700">${lbl}</text>`;
  }

  // ── Attic vents ──
  const vy = hTop + 2;
  [-28, 28].forEach(dx => {
    const vx = hMid + dx;
    s += `<rect x="${vx-7}" y="${vy-7}" width="14" height="10" rx="2" fill="${ventFill}" stroke="${ventsOK?'#1e8449':'#a93226'}" stroke-width="1.5"/>`;
    for (let gx = -3; gx <= 3; gx += 3)
      s += `<line x1="${vx+gx}" y1="${vy-7}" x2="${vx+gx}" y2="${vy+3}" stroke="white" stroke-width="0.8" opacity="0.7"/>`;
  });

  // ── Windows ──
  const wy = hTop + 22, wW = 38, wH = 46;
  [hX+20, hX+hW-20-wW].forEach(wx => {
    s += `<rect x="${wx}" y="${wy}" width="${wW}" height="${wH}" fill="${winFill}" stroke="${winEdge}" stroke-width="2"/>
    <line x1="${wx}" y1="${wy+wH/2}" x2="${wx+wW}" y2="${wy+wH/2}" stroke="${winEdge}" stroke-width="1.5"/>
    <line x1="${wx+wW/2}" y1="${wy}" x2="${wx+wW/2}" y2="${wy+wH}" stroke="${winEdge}" stroke-width="1.5"/>`;
    if (filmApplied && !winsReplaced)
      s += `<rect x="${wx}" y="${wy}" width="${wW}" height="${wH}" fill="#5dade2" opacity="0.2"/>`;
  });
  if (effectiveWinType)
    s += `<text x="${hMid}" y="${wy+wH+13}" text-anchor="middle" font-size="9" fill="#7f8c8d">${effectiveWinType}</text>`;

  // ── Door ──
  const dW = 30, dH = 50;
  s += `<rect x="${hMid-dW/2}" y="${ground-dH}" width="${dW}" height="${dH}" fill="#7b5a2a" stroke="#5d4037" stroke-width="1.5" rx="2"/>
  <circle cx="${hMid+dW/2-6}" cy="${ground-dH/2}" r="2.5" fill="#f0c040"/>`;

  // ── Vegetation ──
  const rightEdge = hX + hW;
  if (veg.length > 0 && !vegRemoved) {
    const maxDist = Math.max(...veg.map(v => v.distance_to_window || 0), 1);
    const avail = W - rightEdge - 30;
    const sc = Math.min(2.2, avail / maxDist * 0.88);

    veg.forEach(item => {
      const dist = item.distance_to_window || 0;
      const vx = rightEdge + dist * sc;
      const isTree = item.type === 'Tree', isShrub = item.type === 'Shrub';
      const mitigated = (pruneTrees && isTree) || (retardant && isShrub);
      const ok = mitigated || !vegVuln;
      const vc = ok ? '#27ae60' : '#c0392b', ve = ok ? '#1e8449' : '#922b21';

      if (isTree) {
        const th = pruneTrees ? 36 : 62, tw = 26, ttop = ground - th - 10;
        s += `<rect x="${vx-3}" y="${ground-12}" width="6" height="12" fill="#8d6e43"/>
        <polygon points="${vx},${ttop} ${vx-tw/2},${ttop+th} ${vx+tw/2},${ttop+th}" fill="${vc}" stroke="${ve}" stroke-width="1.5"/>`;
      } else if (isShrub) {
        s += `<ellipse cx="${vx}" cy="${ground-10}" rx="14" ry="11" fill="${vc}" stroke="${ve}" stroke-width="1.5"/>`;
      }
      s += `<text x="${vx}" y="${ground+14}" text-anchor="middle" font-size="10" fill="#333" font-weight="500">${dist}ft</text>
      <text x="${vx}" y="${ground+24}" text-anchor="middle" font-size="9" fill="#666">${item.type}</text>`;

      // Distance line
      const ly2 = wy + wH/2;
      const lc2 = ok ? '#27ae60' : '#e74c3c';
      s += `<line x1="${rightEdge}" y1="${ly2}" x2="${vx}" y2="${ly2}" stroke="${lc2}" stroke-width="1" stroke-dasharray="4,3" opacity="0.65"/>`;
    });
  } else if (vegRemoved && vegVuln) {
    s += `<text x="${rightEdge+55}" y="${ground-55}" text-anchor="middle" font-size="12" fill="#27ae60" font-weight="600">Vegetation Removed ✓</text>`;
  }

  s += `</svg>`;
  return s;
}

function toggleFullMitigation(name) {
  if (appliedFullMitigations.has(name)) appliedFullMitigations.delete(name);
  else appliedFullMitigations.add(name);
  // Re-render just the house visual without a server round-trip
  if (lastEvaluationData) renderResultsView(lastEvaluationData);
}

function renderResults(data) {
  lastEvaluationData = data;
  renderResultsView(data);
}

function renderResultsView(data) {
  const { vulnerabilities, summary } = data;

  // Derive violation slugs for the house visual
  const violations = new Set(vulnerabilities.map(v => v.rule_slug));

  const fmtFrom = data.from_date != null ? msToLocal(data.from_date) : null;
  const fmtTo   = data.to_date   != null ? msToLocal(data.to_date)   : null;
  const fmtAt   = data.evaluated_at != null ? msToLocal(data.evaluated_at) : '';
  const periodLabel = fmtFrom && fmtTo
    ? `${fmtFrom} → ${fmtTo}`
    : fmtFrom ? `from ${fmtFrom}`
    : fmtTo   ? `to ${fmtTo}`
    : `current rules (${fmtAt})`;

  // House visual always shown after evaluation
  let html = `<div class="house-visual">${buildHouseVisual(baseObservations, violations, appliedMitigations, appliedFullMitigations)}</div>`;

  if (vulnerabilities.length === 0) {
    html += `<div class="summary-pass">✓ Property passes all active rules<br><small style="font-weight:400; opacity:0.75;">Evaluated: ${periodLabel}</small></div>`;
  } else {
    const rangeLabel = fmtFrom && fmtTo
      ? `<span>Period: <strong>${fmtFrom}</strong> → <strong>${fmtTo}</strong></span>`
      : fmtFrom
        ? `<span>From: <strong>${fmtFrom}</strong></span>`
      : fmtTo
        ? `<span>To: <strong>${fmtTo}</strong></span>`
      : `<span>Evaluated at: <strong>${fmtAt}</strong></span>`;

    html += `
      <div class="summary-bar">
        ${rangeLabel}
        <span>Vulnerabilities: <strong>${summary.total_vulnerabilities}</strong></span>
        <span>Categories: <strong>${summary.categories_affected.join(', ')}</strong></span>
        ${summary.unmitigatable_count ? `<span style="color:var(--red)">Unmitigatable: <strong>${summary.unmitigatable_count}</strong></span>` : ''}
        ${summary.bridge_mitigation_count ? `<span style="color:var(--yellow)">Bridge-only: <strong>${summary.bridge_mitigation_count}</strong></span>` : ''}
      </div>
    `;
    vulnerabilities.forEach(v => {
      const hasFullMit = v.full_mitigations.length > 0;
      const hasBridge  = v.bridge_mitigations.length > 0;
      const hasSimulator = v.violation_details && v.violation_details.length > 0 && hasBridge;

      html += `
        <div class="vuln-card">
          <div class="vuln-header">
            <div>
              <div class="vuln-title">${v.rule_name}</div>
              <div class="vuln-category">${v.category}</div>
            </div>
          </div>
          <div class="vuln-body">
            <div class="written-rule">${v.written_rule}</div>
            ${hasFullMit ? `
              <div class="mit-section full">
                <h4>Full Mitigations</h4>
                <div class="mit-checkbox-list">
                  ${v.full_mitigations.map(m => {
                    const id = 'fmit-' + m.name.replace(/[^a-z0-9]/gi, '-').toLowerCase();
                    const isApplied = appliedFullMitigations.has(m.name);
                    const esc = m.name.replace(/'/g, "\\'");
                    return `<div class="mit-checkbox-item full-mit${isApplied ? ' applied' : ''}">
                      <input type="checkbox" id="${id}" ${isApplied ? 'checked' : ''} onchange="toggleFullMitigation('${esc}')"/>
                      <label for="${id}"><strong>${m.name}</strong>${m.description ? `<div class="mit-desc">${m.description}</div>` : ''}</label>
                    </div>`;
                  }).join('')}
                </div>
              </div>` : ''}
            ${hasSimulator ? renderSimulator(v) : hasBridge ? `
              <div class="mit-section bridge">
                <h4>Bridge Mitigations (partial)</h4>
                <ul class="mit-list">
                  ${v.bridge_mitigations.map(m => `<li><strong>${m.name}</strong>${m.description ? `<div class="mit-desc">${m.description}</div>` : ''}</li>`).join('')}
                </ul>
              </div>` : ''}
            ${!hasFullMit && !hasBridge ? `
              <div class="mit-section none">
                <h4>No Available Mitigations</h4>
                <ul class="mit-list"><li>This is an unmitigatable property characteristic.</li></ul>
              </div>` : ''}
          </div>
        </div>
      `;
    });
  }
  document.getElementById('results').innerHTML = html;
}

function renderSimulator(v) {
  const allPass = v.violation_details.every(d => d.passes);
  const rows = v.violation_details.map(d => `
    <tr class="${d.passes ? 'sim-pass' : 'sim-fail'}">
      <td>${d.vegetation_type}</td>
      <td>${d.actual_distance} ft</td>
      <td>${d.required_distance} ft</td>
      <td class="sim-status ${d.passes ? 'pass' : 'fail'}">${d.passes ? '✓ OK' : '✗ Fails'}</td>
    </tr>
  `).join('');

  const checkboxes = v.bridge_mitigations
    .filter(m => m.modifier_params && m.modifier_params.slug)
    .map(m => {
      const slug = m.modifier_params.slug;
      const isApplied = appliedMitigations.has(slug);
      return `
        <div class="mit-checkbox-item${isApplied ? ' applied' : ''}">
          <input type="checkbox" id="mit-${slug}" ${isApplied ? 'checked' : ''} onchange="toggleMitigation('${slug}')" />
          <label for="mit-${slug}">
            <strong>${m.name}</strong>
            <span>${m.description || ''}</span>
          </label>
        </div>
      `;
    }).join('');

  const resolution = allPass
    ? `<div class="sim-resolved pass">✓ Vulnerability resolved with selected mitigations</div>`
    : appliedMitigations.size > 0
      ? `<div class="sim-resolved fail">✗ Vulnerability persists — additional or full mitigations needed</div>`
      : '';

  return `
    <div class="simulator">
      <h4>Mitigation Simulator</h4>
      <table class="sim-table">
        <thead><tr><th>Vegetation</th><th>Actual</th><th>Required</th><th>Status</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
      <div class="mit-checkbox-list">${checkboxes}</div>
      ${resolution}
    </div>
  `;
}

function loadExample() {
  document.getElementById('attic_vent_screens').value = 'None';
  document.getElementById('roof_type').value = 'Class B';
  document.getElementById('window_type').value = 'Single';
  document.getElementById('wildfire_risk_category').value = 'B';
  document.getElementById('home_to_home_distance').value = '20';
  vegetationItems = [
    { type: 'Tree', distance: 25 },
    { type: 'Shrub', distance: 8 },
  ];
  renderVegetation();
}

function clearForm() {
  ['attic_vent_screens','roof_type','window_type','wildfire_risk_category'].forEach(f => document.getElementById(f).value = '');
  document.getElementById('home_to_home_distance').value = '';
  document.getElementById('from_date').value = '';
  document.getElementById('to_date').value = '';
  vegetationItems = [];
  renderVegetation();
  document.getElementById('results').innerHTML = '';
}

// ─── APPLIED SCIENCE ─────────────────────────────────────────────────────────
async function loadRules() {
  document.getElementById('rules-table-container').innerHTML = '<div class="loading">Loading…</div>';
  try {
    const res = await fetch('/admin/rules');
    allRules = await res.json();
    renderRulesTable();
  } catch (e) {
    document.getElementById('rules-table-container').innerHTML = `<div class="error-msg">Failed to load rules: ${e.message}</div>`;
  }
}

function renderRulesTable() {
  if (!allRules.length) {
    document.getElementById('rules-table-container').innerHTML = '<div class="empty">No rules found.</div>';
    return;
  }
  const rows = allRules.map(r => `
    <tr>
      <td><strong>${r.name}</strong><div style="font-size:11px;color:var(--muted)">${r.slug}</div></td>
      <td>${r.category}</td>
      <td><code style="font-size:11px">${r.type}</code></td>
      <td><span class="badge badge-${r.status}">${r.status.replace('_',' ')}</span></td>
      <td>${r.author_name}</td>
      <td>
        <div class="actions">
          <button class="btn btn-outline btn-sm" onclick="viewRuleDetail(${r.id})">View</button>
          ${r.status === 'draft' ? `<button class="btn btn-outline btn-sm" onclick="openEditModal(${r.id})">Edit</button>` : ''}
          ${r.status === 'draft' ? `<button class="btn btn-green btn-sm" onclick="openTestModal(${r.id})">Test</button>` : ''}
          ${r.status === 'under_review' ? `<button class="btn btn-green btn-sm" onclick="openTestModal(${r.id})">Test</button>` : ''}
          ${getTransitionButtons(r)}
        </div>
      </td>
    </tr>
  `).join('');
  document.getElementById('rules-table-container').innerHTML = `
    <table>
      <thead><tr><th>Name / Slug</th><th>Category</th><th>Type</th><th>Status</th><th>Author</th><th>Actions</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
  `;
}

function getTransitionButtons(r) {
  const transitions = {
    draft:        [['Send for Review','under_review','btn-outline'],['Deactivate','deactivated','btn-danger']],
    under_review: [['Activate','activated','btn-green'],['Back to Draft','draft','btn-outline']],
    activated:    [['Deactivate','deactivated','btn-danger']],
    deactivated:  [['Reactivate','activated','btn-green']],
  };
  return (transitions[r.status] || []).map(([label, to, cls]) =>
    `<button class="btn ${cls} btn-sm" onclick="doTransition(${r.id},'${to}')">${label}</button>`
  ).join('');
}

function doTransition(ruleId, toStatus) {
  const rule = allRules.find(r => r.id === ruleId);
  document.getElementById('transition-rule-id').value = ruleId;
  document.getElementById('transition-to-status').value = toStatus;
  document.getElementById('transition-modal-title').textContent =
    `${toStatus.replace('_', ' ').replace(/\b\w/g, c => c.toUpperCase())}: ${rule ? rule.name : ''}`;
  document.getElementById('transition-author').value = '';
  document.getElementById('transition-note').value = '';
  document.getElementById('transition-modal').classList.add('open');
}

function closeTransitionModal() {
  document.getElementById('transition-modal').classList.remove('open');
}

async function confirmTransition() {
  const ruleId = document.getElementById('transition-rule-id').value;
  const toStatus = document.getElementById('transition-to-status').value;
  const author = document.getElementById('transition-author').value.trim();
  const note = document.getElementById('transition-note').value.trim();

  if (!author) {
    document.getElementById('transition-author').focus();
    return;
  }

  try {
    const res = await fetch(`/admin/rules/${ruleId}/transition`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        to_status: toStatus,
        author_id: author.toLowerCase().replace(/\s+/g, '_'),
        author_name: author,
        note: note || null,
      }),
    });
    if (!res.ok) {
      let message = `Server error (${res.status})`;
      try { const err = await res.json(); message = err.detail || message; } catch (_) {}
      alert(message);
      return;
    }
    closeTransitionModal();
    await loadRules();
    document.getElementById('rule-detail').innerHTML = '';
  } catch (e) {
    alert('Request failed: ' + e.message);
  }
}

async function viewRuleDetail(ruleId) {
  const rule = allRules.find(r => r.id === ruleId);
  if (!rule) return;

  const auditRes = await fetch(`/admin/rules/${ruleId}/audit`);
  const audit = await auditRes.json();

  const mitHtml = rule.mitigations.length ? rule.mitigations.map(m => `
    <div style="padding:6px 10px; background:var(--bg); border-radius:5px; margin-bottom:4px;">
      <span class="badge ${m.type==='full'?'badge-activated':'badge-under_review'}">${m.type}</span>
      <strong style="margin-left:6px">${m.name}</strong>
      ${m.description ? `<div style="font-size:12px;color:var(--muted);margin-top:2px">${m.description}</div>` : ''}
    </div>
  `).join('') : '<div style="color:var(--muted);font-size:13px">No mitigations (unmitigatable rule)</div>';

  const auditHtml = audit.length ? `<ul class="audit-log">` + audit.map(a => `
    <li class="audit-entry">
      <span class="ts">${a.created_at != null ? msToLocal(a.created_at) : '—'}</span>
      <span><strong>${a.author_name}</strong> <span class="audit-arrow">→</span>
        <span class="badge badge-${a.to_status}">${a.to_status.replace('_',' ')}</span>
        ${a.note ? `<span style="color:var(--muted)"> — ${a.note}</span>` : ''}
      </span>
    </li>
  `).join('') + '</ul>' : '<div style="color:var(--muted);font-size:13px">No audit entries</div>';

  document.getElementById('rule-detail').innerHTML = `
    <div class="detail-panel">
      <h3>${rule.name} <span class="badge badge-${rule.status}" style="margin-left:8px">${rule.status.replace('_',' ')}</span></h3>
      <div class="detail-section">
        <label>Written Rule</label>
        <div style="font-size:13px;font-style:italic;color:var(--muted)">${rule.written_rule}</div>
      </div>
      <div class="detail-section" style="display:flex;gap:32px">
        <div>
          <label>Activated</label>
          <div style="font-size:13px">${rule.activated_at != null ? msToLocal(rule.activated_at) : '—'}</div>
        </div>
        <div>
          <label>Deactivated</label>
          <div style="font-size:13px">${rule.deactivated_at != null ? msToLocal(rule.deactivated_at) : '—'}</div>
        </div>
      </div>
      <div class="detail-section">
        <label>Definition</label>
        <pre class="code-block">${JSON.stringify(rule.definition, null, 2)}</pre>
      </div>
      <div class="detail-section">
        <label>Mitigations</label>
        ${mitHtml}
      </div>
      <div class="detail-section">
        <label>Audit Log</label>
        ${auditHtml}
      </div>
    </div>
  `;
  document.getElementById('rule-detail').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ─── CREATE / EDIT MODAL ─────────────────────────────────────────────────────
function openCreateModal() {
  document.getElementById('modal-title').textContent = 'New Rule';
  document.getElementById('modal-rule-id').value = '';
  ['m-slug','m-category','m-name','m-written-rule','m-definition','m-change-note','m-author-name'].forEach(id => {
    document.getElementById(id).value = '';
  });
  document.getElementById('m-type').value = 'boolean_condition';
  document.getElementById('m-slug').disabled = false;
  document.getElementById('rule-modal').classList.add('open');
}

function openEditModal(ruleId) {
  const rule = allRules.find(r => r.id === ruleId);
  if (!rule) return;
  document.getElementById('modal-title').textContent = 'Edit Draft Rule';
  document.getElementById('modal-rule-id').value = ruleId;
  document.getElementById('m-slug').value = rule.slug;
  document.getElementById('m-slug').disabled = true;
  document.getElementById('m-category').value = rule.category;
  document.getElementById('m-name').value = rule.name;
  document.getElementById('m-written-rule').value = rule.written_rule;
  document.getElementById('m-type').value = rule.type;
  document.getElementById('m-definition').value = JSON.stringify(rule.definition, null, 2);
  document.getElementById('m-change-note').value = rule.change_note || '';
  document.getElementById('m-author-name').value = rule.author_name || '';
  document.getElementById('rule-modal').classList.add('open');
}

function closeModal() {
  document.getElementById('rule-modal').classList.remove('open');
}

async function saveRule() {
  const ruleId = document.getElementById('modal-rule-id').value;
  const authorName = document.getElementById('m-author-name').value.trim();
  if (!authorName) { alert('Author name is required'); return; }

  let definition;
  try { definition = JSON.parse(document.getElementById('m-definition').value); }
  catch (e) { alert('Definition is not valid JSON'); return; }

  const payload = {
    slug: document.getElementById('m-slug').value.trim(),
    category: document.getElementById('m-category').value.trim(),
    name: document.getElementById('m-name').value.trim(),
    written_rule: document.getElementById('m-written-rule').value.trim(),
    type: document.getElementById('m-type').value,
    definition,
    author_id: authorName.toLowerCase().replace(/\s+/g, '_'),
    author_name: authorName,
    change_note: document.getElementById('m-change-note').value.trim() || null,
    mitigations: [],
  };

  try {
    const url = ruleId ? `/admin/rules/${ruleId}` : '/admin/rules';
    const method = ruleId ? 'PUT' : 'POST';
    const res = await fetch(url, {
      method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload),
    });
    if (!res.ok) {
      let message = `Server error (${res.status})`;
      try { const err = await res.json(); message = err.detail || message; } catch (_) {}
      alert(message);
      return;
    }
    closeModal();
    await loadRules();
  } catch (e) {
    alert('Request failed: ' + e.message);
  }
}

// ─── TEST MODAL ───────────────────────────────────────────────────────────────
function openTestModal(ruleId) {
  testingRuleId = ruleId;
  const rule = allRules.find(r => r.id === ruleId);
  document.getElementById('test-modal-subtitle').textContent = `Rule: ${rule ? rule.name : ruleId}`;
  document.getElementById('test-observations').value = JSON.stringify({
    attic_vent_screens: "None",
    roof_type: "Class B",
    window_type: "Single",
    wildfire_risk_category: "B",
    home_to_home_distance: 20,
    vegetation: [{ type: "Tree", distance_to_window: 25 }]
  }, null, 2);
  document.getElementById('test-result').innerHTML = '';
  document.getElementById('test-modal').classList.add('open');
}

function closeTestModal() {
  document.getElementById('test-modal').classList.remove('open');
  testingRuleId = null;
}

async function loadRandomRule() {
  let rules = allRules;
  if (!rules.length) {
    try {
      const res = await fetch('/admin/rules');
      rules = await res.json();
    } catch (e) {
      alert('Failed to load rules: ' + e.message);
      return;
    }
  }
  if (!rules.length) {
    alert('No rules available to use as a template.');
    return;
  }
  const rule = rules[Math.floor(Math.random() * rules.length)];
  document.getElementById('m-slug').value = rule.slug + '_copy';
  document.getElementById('m-slug').disabled = false;
  document.getElementById('m-category').value = rule.category;
  document.getElementById('m-name').value = rule.name + ' (Copy)';
  document.getElementById('m-written-rule').value = rule.written_rule;
  document.getElementById('m-type').value = rule.type;
  document.getElementById('m-definition').value = JSON.stringify(rule.definition, null, 2);
  document.getElementById('m-change-note').value = '';
  document.getElementById('m-author-name').value = '';
}

async function runTest() {
  if (!testingRuleId) return;
  let observations;
  try { observations = JSON.parse(document.getElementById('test-observations').value); }
  catch (e) { alert('Observations must be valid JSON'); return; }

  try {
    const res = await fetch(`/admin/rules/${testingRuleId}/test`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ observations }),
    });
    const data = await res.json();
    if (!res.ok) {
      document.getElementById('test-result').innerHTML = `<div class="test-result test-fail">${data.detail}</div>`;
      return;
    }
    document.getElementById('test-result').innerHTML = data.passes
      ? `<div class="test-result test-pass">✓ Rule PASSES — no vulnerability triggered</div>`
      : `<div class="test-result test-fail">✗ Rule FAILS — vulnerability would be triggered</div>`;
  } catch (e) {
    document.getElementById('test-result').innerHTML = `<div class="test-result test-fail">Request failed: ${e.message}</div>`;
  }
}
</script>
